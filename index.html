<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>今天吃什么 · 2026年3月</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --card-hover: #222636;
            --accent: #e8a849;
            --accent2: #f06e4f;
            --accent3: #4ecdc4;
            --text: #e8e8ec;
            --text-dim: #8b8d97;
            --border: #2a2d3a;
            --breakfast: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --lunch: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --dinner: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 17, 23, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px 12px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .month-label {
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 400;
        }

        /* Date Strip */
        .date-strip {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0 8px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .date-strip::-webkit-scrollbar {
            display: none;
        }

        .date-btn {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 12px;
            border-radius: 14px;
            border: 1px solid transparent;
            background: var(--glass);
            cursor: pointer;
            transition: all 0.3s;
            min-width: 52px;
        }

        .date-btn:hover {
            background: var(--card-hover);
        }

        .date-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-color: transparent;
            transform: scale(1.05);
        }

        .date-btn.active .date-weekday,
        .date-btn.active .date-day {
            color: #fff !important;
            font-weight: 700;
        }

        .date-btn.today:not(.active) {
            border-color: var(--accent);
        }

        .date-weekday {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 2px;
        }

        .date-day {
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
        }

        .date-btn.weekend {
            opacity: 0.3;
            pointer-events: none;
        }

        .date-btn.weekend .date-day {
            font-size: 13px;
        }

        /* Week separator */
        .week-sep {
            flex-shrink: 0;
            width: 2px;
            background: var(--border);
            margin: 4px 2px;
            border-radius: 1px;
        }

        /* Content */
        .content {
            padding: 16px 16px 100px;
            max-width: 600px;
            margin: 0 auto;
        }

        .day-info {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeIn 0.4s ease;
        }

        .day-info .date-full {
            font-size: 18px;
            font-weight: 500;
        }

        .day-info .weekday-full {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* Meal Card */
        .meal-card {
            background: var(--card);
            border-radius: 20px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            animation: slideUp 0.5s ease;
            transition: transform 0.2s;
        }

        .meal-card:nth-child(2) {
            animation-delay: 0.1s;
        }

        .meal-card:nth-child(3) {
            animation-delay: 0.2s;
        }

        .meal-header {
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }

        .meal-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .meal-icon.breakfast {
            background: var(--breakfast);
        }

        .meal-icon.lunch {
            background: var(--lunch);
        }

        .meal-icon.dinner {
            background: var(--dinner);
        }

        .meal-title-wrap {
            flex: 1;
            min-width: 0;
        }

        .meal-type {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .meal-title {
            font-size: 15px;
            font-weight: 500;
            margin-top: 2px;
            line-height: 1.4;
        }

        .expand-icon {
            font-size: 18px;
            color: var(--text-dim);
            transition: transform 0.3s;
            flex-shrink: 0;
        }

        .meal-card.open .expand-icon {
            transform: rotate(180deg);
        }

        /* Detail */
        .meal-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .meal-card.open .meal-detail {
            max-height: 800px;
        }

        .meal-detail-inner {
            padding: 0 18px 16px;
        }

        .ingredient-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .ingredient {
            background: var(--glass);
            border-radius: 12px;
            padding: 12px 14px;
            border: 1px solid var(--border);
        }

        .ing-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .ing-name {
            font-size: 14px;
            font-weight: 500;
        }

        .ing-method {
            font-size: 11px;
            color: var(--accent);
            background: rgba(232, 168, 73, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ing-nutrients {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 6px;
            line-height: 1.6;
        }

        .nutrient-tag {
            display: inline-block;
            background: rgba(78, 205, 196, 0.1);
            color: var(--accent3);
            padding: 1px 6px;
            border-radius: 4px;
            margin: 2px 2px 2px 0;
            font-size: 11px;
        }

        .nutrient-tag.highlight {
            background: rgba(240, 110, 79, 0.15);
            color: var(--accent2);
            font-weight: 500;
        }

        /* Weekend */
        .weekend-msg {
            text-align: center;
            padding: 80px 20px;
            animation: fadeIn 0.4s ease;
        }

        .weekend-emoji {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .weekend-text {
            font-size: 18px;
            color: var(--text-dim);
            line-height: 1.8;
        }

        /* Nav Arrows */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 17, 23, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .nav-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .nav-btn:hover {
            background: var(--card-hover);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .nav-today {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #fff;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .nav-today:hover {
            opacity: 0.9;
        }

        .nav-today:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (min-width: 768px) {
            .content {
                padding: 24px 24px 100px;
            }

            .header {
                padding: 20px 24px 16px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-top">
            <h1>🍽️ 今天吃什么</h1>
            <span class="month-label">2026年3月</span>
        </div>
        <div class="date-strip" id="dateStrip"></div>
    </div>

    <div class="content" id="content"></div>

    <div class="nav-bar">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← 前一天</button>
        <button class="nav-today" onclick="goToday()">今天</button>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">后一天 →</button>
    </div>

    <script src="data.js"></script>
    <script>
        let currentDate = null;
        const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];
        const today = new Date().toISOString().split('T')[0];

        function init() {
            buildDateStrip();
            // Default to today if it's a workday in March 2026, otherwise first workday
            if (MEAL_DATA[today]) {
                selectDate(today);
            } else {
                selectDate(WORKDAYS[0]);
            }
        }

        function buildDateStrip() {
            const strip = document.getElementById('dateStrip');
            let html = '';
            let lastWeek = -1;
            for (let d = 1; d <= 31; d++) {
                const dateStr = `2026-03-${String(d).padStart(2, '0')}`;
                const dateObj = new Date(dateStr + 'T00:00:00');
                const dow = dateObj.getDay();
                const weekNum = Math.ceil((d + (new Date('2026-03-01T00:00:00').getDay())) / 7);
                if (dow === 1 && lastWeek !== -1) {
                    html += '<div class="week-sep"></div>';
                }
                lastWeek = weekNum;
                const isWorkday = MEAL_DATA[dateStr];
                const isToday = dateStr === today;
                const isWeekend = dow === 0 || dow === 6;
                if (isWeekend) {
                    html += `<div class="date-btn weekend">
          <span class="date-weekday">周${WEEKDAYS[dow]}</span>
          <span class="date-day">休</span>
        </div>`;
                } else {
                    html += `<div class="date-btn${isToday ? ' today' : ''}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">
          <span class="date-weekday">周${WEEKDAYS[dow]}</span>
          <span class="date-day">${d}</span>
        </div>`;
                }
            }
            strip.innerHTML = html;
        }

        function selectDate(dateStr) {
            currentDate = dateStr;
            // Update active state
            document.querySelectorAll('.date-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.date === dateStr);
            });
            // Scroll active into view
            const activeBtn = document.querySelector('.date-btn.active');
            if (activeBtn) {
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            renderMeals(dateStr);
            updateNav();
        }

        function renderMeals(dateStr) {
            const content = document.getElementById('content');
            const data = MEAL_DATA[dateStr];
            if (!data) {
                content.innerHTML = `<div class="weekend-msg">
        <div class="weekend-emoji">🎉</div>
        <div class="weekend-text">今天是休息日<br>自由选择想吃的吧！</div>
      </div>`;
                return;
            }
            const dateObj = new Date(dateStr + 'T00:00:00');
            const dow = dateObj.getDay();
            const month = dateObj.getMonth() + 1;
            const day = dateObj.getDate();
            let html = `<div class="day-info">
      <div class="date-full">${month}月${day}日</div>
      <div class="weekday-full">星期${WEEKDAYS[dow]}</div>
    </div>`;
            const meals = [
                { key: 'breakfast', type: '早餐', icon: '🌅', cls: 'breakfast' },
                { key: 'lunch', type: '午餐', icon: '☀️', cls: 'lunch' },
                { key: 'dinner', type: '晚餐', icon: '🌙', cls: 'dinner' }
            ];
            meals.forEach(meal => {
                const d = data[meal.key];
                if (!d) return;
                html += `<div class="meal-card" onclick="toggleCard(this)">
        <div class="meal-header">
          <div class="meal-icon ${meal.cls}">${meal.icon}</div>
          <div class="meal-title-wrap">
            <div class="meal-type">${meal.type}</div>
            <div class="meal-title">${d.title}</div>
          </div>
          <span class="expand-icon">▼</span>
        </div>
        <div class="meal-detail">
          <div class="meal-detail-inner">
            <div class="ingredient-row">
              ${d.items.map(item => renderIngredient(item)).join('')}
            </div>
          </div>
        </div>
      </div>`;
            });
            content.innerHTML = html;
        }

        function renderIngredient(item) {
            const nutrients = item.n.split('·').map(n => {
                const nt = n.trim();
                const isHighlight = nt.includes('Omega') || nt.includes('降LDL') || nt.includes('异黄酮') || nt.includes('β-葡聚糖');
                return `<span class="nutrient-tag${isHighlight ? ' highlight' : ''}">${nt}</span>`;
            }).join('');
            const methodHtml = item.m !== '—'
                ? `<span class="ing-method">${item.m}</span>` : '';
            return `<div class="ingredient">
      <div class="ing-top">
        <span class="ing-name">${item.i}</span>
        ${methodHtml}
      </div>
      <div class="ing-nutrients">${nutrients}</div>
    </div>`;
        }

        function toggleCard(card) {
            card.classList.toggle('open');
        }

        function navigate(dir) {
            const idx = WORKDAYS.indexOf(currentDate);
            const newIdx = idx + dir;
            if (newIdx >= 0 && newIdx < WORKDAYS.length) {
                selectDate(WORKDAYS[newIdx]);
            }
        }

        function goToday() {
            if (MEAL_DATA[today]) {
                selectDate(today);
            } else {
                // Find closest workday
                let closest = WORKDAYS[0];
                for (const d of WORKDAYS) {
                    if (d <= today) closest = d;
                }
                selectDate(closest);
            }
        }

        function updateNav() {
            const idx = WORKDAYS.indexOf(currentDate);
            document.getElementById('prevBtn').disabled = idx <= 0;
            document.getElementById('nextBtn').disabled = idx >= WORKDAYS.length - 1;
        }

        init();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
